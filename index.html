<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HEE · 痕迹</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='70' font-size='70' text-anchor='middle' fill='%23ffd966'%3E🦌%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="desktop.css">
</head>
<body>
    <div class="wallpaper"></div>
    
    <div class="desktop-icons">
        <div class="desktop-icon" data-folder="documents">
            <div class="icon-folder">📁</div>
            <span class="icon-label">Documents</span>
        </div>
        <div class="desktop-icon" data-folder="downloads">
            <div class="icon-folder">📁</div>
            <span class="icon-label">Downloads</span>
        </div>
        <div class="desktop-icon" data-folder="recycle">
            <div class="icon-folder">🗑️</div>
            <span class="icon-label">Recycle Bin</span>
        </div>
        <div class="desktop-icon archive-icon" data-folder="archive">
            <div class="icon-folder" id="archiveFolderIcon">❓</div>
            <span class="icon-label" id="archiveLabel">HEE</span>
        </div>
    </div>

    <div class="taskbar">
        <div class="start-btn">🖥️</div>
        <div class="taskbar-time" id="taskbarTime">--:--</div>
        <div class="network-status">🌐 已连接</div>
        <div class="deer-icon" id="deerIcon">🦌</div>
    </div>

    <!-- 右键菜单 -->
    <div id="contextMenu" class="context-menu hidden">
        <div class="context-item" id="menuDelete">删除</div>
        <div class="context-item" id="menuProperties">属性</div>
    </div>

    <!-- 密码对话框 -->
    <div id="passwordDialog" class="dialog hidden">
        <div class="dialog-content">
            <h3>🔒 验证身份</h3>
            <p style="font-size:12px;color:#888;margin-bottom:15px;">这个文件夹需要密码才能打开。</p>
            <input type="password" id="passwordInput" placeholder="输入密码" style="width:100%;padding:8px;background:#1a1a1a;border:1px solid #4a4a4a;color:white;border-radius:6px;">
            <div class="dialog-buttons" style="margin-top:15px;">
                <button id="submitPassword">确定</button>
                <button id="cancelPassword">取消</button>
            </div>
        </div>
    </div>

    <div id="deleteDialog" class="dialog hidden">
        <div class="dialog-content">
            <p id="deleteMessage">确定要删除此文件夹吗？</p>
            <div class="dialog-buttons">
                <button id="confirmDelete">确定</button>
                <button id="cancelDelete">取消</button>
            </div>
        </div>
    </div>

    <div id="propertiesDialog" class="dialog hidden">
        <div class="dialog-content">
            <h3>📁 HEE 属性</h3>
            <div class="prop-row"><span class="prop-label">类型：</span><span>文件夹</span></div>
            <div class="prop-row"><span class="prop-label">位置：</span><span>C:\Users\Unknown\Desktop</span></div>
            <div class="prop-row"><span class="prop-label">大小：</span><span id="propSize">计算中...</span></div>
            <div class="prop-row"><span class="prop-label">创建时间：</span><span>无法读取</span></div>
            <div class="prop-row"><span class="prop-label">修改时间：</span><span>无法读取</span></div>
            <div class="prop-row"><span class="prop-label">属性：</span><span>🔒 只读 · 🔒 隐藏 · 🔒 系统</span></div>
            <div class="creator-note" id="creatorNote"></div>
            <button id="closeProperties" class="dialog-close">关闭</button>
        </div>
    </div>

    <div id="notification" class="notification hidden"></div>
    <div id="bootScreen" class="boot-screen"><div class="boot-text"><div>Booting...</div><div>Loading Windows...</div><div>Loading personal settings...</div><div class="boot-done">Welcome.</div></div></div>

    <script>
        let deleteAttempts = 0;
        let notificationTimeout;
        let bootCompleted = false;

        if (!localStorage.getItem('boot_completed')) {
            setTimeout(() => {
                const bootScreen = document.getElementById('bootScreen');
                bootScreen.classList.add('fade-out');
                setTimeout(() => {
                    bootScreen.style.display = 'none';
                    localStorage.setItem('boot_completed', 'true');
                    bootCompleted = true;
                }, 1000);
            }, 2000);
        } else {
            document.getElementById('bootScreen').style.display = 'none';
            bootCompleted = true;
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('taskbarTime').textContent = now.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
        }
        updateTime();
        setInterval(updateTime, 1000);

        function showNotification(msg, duration = 3000) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.classList.remove('hidden');
            if (notificationTimeout) clearTimeout(notificationTimeout);
            notificationTimeout = setTimeout(() => notif.classList.add('hidden'), duration);
        }

        const contextMenu = document.getElementById('contextMenu');
        function hideContextMenu() { contextMenu.classList.add('hidden'); }
        document.addEventListener('click', hideContextMenu);

        const archiveIcon = document.querySelector('.archive-icon');
        
        // 检查是否触发了痕迹结局，需要显示提示
        function checkTraceEndingTriggered() {
            const traceTriggered = localStorage.getItem('trace_ending_triggered');
            const hiddenEndingDone = localStorage.getItem('secret_ending_triggered');
            
            if (traceTriggered === 'true' && hiddenEndingDone !== 'true') {
                const label = document.getElementById('archiveLabel');
                if (label) {
                    label.innerHTML = 'HEE<span style="color:#ff6666;font-size:10px;margin-left:4px;">✨打开它✨</span>';
                }
                showNotification('🦌 文件夹上出现了一行小字...', 3000);
            }
            
            if (hiddenEndingDone === 'true') {
                const label = document.getElementById('archiveLabel');
                if (label) label.innerHTML = 'HEE<span style="color:#4ade80;font-size:10px;margin-left:4px;">💖</span>';
            }
        }
        
        checkTraceEndingTriggered();

        archiveIcon.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            contextMenu.style.left = e.pageX + 'px';
            contextMenu.style.top = e.pageY + 'px';
            contextMenu.classList.remove('hidden');
        });

        document.getElementById('menuDelete').addEventListener('click', () => {
            hideContextMenu();
            deleteAttempts++;
            if (deleteAttempts === 1) showNotification('⚠️ 无法删除此文件夹：访问被拒绝');
            else if (deleteAttempts === 2) showNotification('❓ 你确定要删吗...算了问了也没用');
            else if (deleteAttempts === 3) {
                showNotification('⚠️ 此文件夹包含系统关键文件，删除可能导致系统不稳定。请勿尝试。——最后一位使用者');
                document.getElementById('archiveFolderIcon').textContent = '🔒';
            } else showNotification('⛔ 系统保护：此操作已被禁止');
        });

        document.getElementById('menuProperties').addEventListener('click', () => {
            hideContextMenu();
            const sizeText = deleteAttempts >= 2 ? '未知 (受保护)' : '计算中...';
            document.getElementById('propSize').textContent = sizeText;
            const creatorNote = document.getElementById('creatorNote');
            if (deleteAttempts >= 1) creatorNote.innerHTML = '创建者：L.H.S<br><span style="font-size:11px;color:#888;">最后访问：' + new Date().toLocaleDateString() + '</span>';
            else creatorNote.innerHTML = '创建者：Unknown';
            document.getElementById('propertiesDialog').classList.remove('hidden');
        });

        document.getElementById('closeProperties').addEventListener('click', () => {
            document.getElementById('propertiesDialog').classList.add('hidden');
        });

        // 密码验证
        const passwordDialog = document.getElementById('passwordDialog');
        const passwordInput = document.getElementById('passwordInput');
        
        function showPasswordDialog() {
            passwordDialog.classList.remove('hidden');
            passwordInput.value = '';
            passwordInput.focus();
        }
        
        document.getElementById('submitPassword').addEventListener('click', () => {
            const pwd = passwordInput.value;
            if (pwd === '1015hs') {
                passwordDialog.classList.add('hidden');
                const hiddenEndingDone = localStorage.getItem('secret_ending_triggered');
                if (hiddenEndingDone === 'true') {
                    window.location.href = 'archive/secret-ending.html?mode=reply';
                } else {
                    window.location.href = 'archive/secret-ending.html';
                }
            } else {
                showNotification('❌ 密码错误', 1500);
                passwordInput.value = '';
            }
        });
        
        document.getElementById('cancelPassword').addEventListener('click', () => {
            passwordDialog.classList.add('hidden');
        });
        
        // 双击打开（带密码验证）
        archiveIcon.addEventListener('dblclick', () => {
            if (!bootCompleted) {
                showNotification('系统正在启动中...', 1500);
                return;
            }
            
            const traceTriggered = localStorage.getItem('trace_ending_triggered');
            const hiddenEndingDone = localStorage.getItem('secret_ending_triggered');
            
            // 如果已经触发过隐藏结局，直接进入
            if (hiddenEndingDone === 'true') {
                window.location.href = 'archive/index.html';
                return;
            }
            
            // 如果触发了痕迹结局，需要密码
            if (traceTriggered === 'true') {
                showPasswordDialog();
            } else {
                // 正常打开
                showNotification('🔓 正在打开 HEE...', 1000);
                setTimeout(() => { window.location.href = 'archive/index.html'; }, 500);
            }
        });

        archiveIcon.addEventListener('click', (e) => {
            if (e.detail === 1 && bootCompleted && deleteAttempts === 0) showNotification('❓ 双击打开', 1500);
        });

        document.querySelectorAll('.desktop-icon:not(.archive-icon)').forEach(icon => {
            icon.addEventListener('dblclick', () => showNotification('📂 此文件夹为空。或者...你没有权限查看。'));
            icon.addEventListener('contextmenu', (e) => { e.preventDefault(); showNotification('⚠️ 无法访问：权限不足'); });
        });

        document.getElementById('deerIcon').addEventListener('click', () => showNotification('🦌 你看见我了', 2000));

        document.querySelectorAll('.dialog').forEach(dialog => {
            dialog.addEventListener('click', (e) => { if (e.target === dialog) dialog.classList.add('hidden'); });
        });

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 's') { e.preventDefault(); showNotification('💾 保存到哪里？你心里吗。'); }
            if (e.key === 'F5') { e.preventDefault(); showNotification('🔄 刷新也不会变快'); }
            if (e.ctrlKey && e.shiftKey && e.key === 'I') {
                e.preventDefault();
                console.log('%c┌─────────────────────────────────┐', '#555');
                console.log('%c│          🦌                       │', '#555');
                console.log('%c│   别拆了。没什么好拆的。           │', '#ffd966');
                console.log('%c└─────────────────────────────────┘', '#555');
            }
        });

        console.log('%c🦌 HEE · 痕迹', 'color: #ffd966; font-size: 14px;');
        console.log('%c触发痕迹结局后，双击文件夹需要密码: 1015hs', 'color: #888; font-size: 11px;');
    </script>
</body>
</html>
