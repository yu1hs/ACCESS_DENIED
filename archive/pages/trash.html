<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRASH - HEE_ARCHIVE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', 'Courier New', monospace;
            color: #ccc;
            padding: 30px;
            min-height: 100vh;
        }

        .trash-header {
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .trash-header h2 {
            color: #ffd966;
            font-size: 20px;
            letter-spacing: 2px;
        }

        .trash-stats {
            font-size: 11px;
            color: #ffd966;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-item {
            background: #0f0f0f;
            border: 1px solid #222;
            border-radius: 6px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .file-item:hover {
            background: #151515;
            border-color: #3a6ea5;
        }

        .file-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
        }

        .file-icon {
            font-size: 20px;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-size: 14px;
            color: #ddd;
            font-family: monospace;
        }

        .file-date {
            font-size: 10px;
            color: #666;
            margin-top: 2px;
        }

        .file-status {
            font-size: 11px;
            color: #888;
        }

        .file-content {
            display: none;
            padding: 16px;
            border-top: 1px solid #222;
            background: #080808;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            font-family: monospace;
            color: #aaa;
        }

        .file-content.open {
            display: block;
        }

        .corrupted {
            color: #ff6644;
        }

        .repair-attempt {
            margin-top: 12px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 6px;
            font-size: 11px;
            color: #888;
        }

        .repair-btn {
            margin-top: 8px;
            background: #2a2a2a;
            border: 1px solid #4a4a4a;
            color: #aaa;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
        }

        .repair-btn:hover {
            background: #3a6ea5;
            color: white;
        }

        .read-badge {
            margin-left: 8px;
            font-size: 10px;
            color: #4ade80;
        }

        .progress-section {
            margin-top: 30px;
            padding: 16px;
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
        }

        .progress-bar {
            background: #1a1a1a;
            border-radius: 10px;
            height: 6px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            background: #ffd966;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 11px;
            color: #888;
            margin-top: 8px;
            text-align: center;
        }

        .restore-note {
            text-align: center;
            margin-top: 20px;
            font-size: 10px;
            color: #555;
        }

        .empty-trash {
            text-align: center;
            padding: 60px 20px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="trash-header">
        <h2>🗑️ TRASH</h2>
        <div class="trash-stats" id="trashStats">📄 已读: 0/5</div>
    </div>

    <div id="fileList" class="file-list">
        <div class="empty-trash">加载中...</div>
    </div>

    <div class="progress-section">
        <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
        </div>
        <div id="progressText" class="progress-text"></div>
    </div>

    <div class="restore-note">
        💡 这些是被删除的草稿。有些可能永远无法恢复。
    </div>

    <script>
        const trashFiles = [
            {
                id: 1,
                name: "draft_01.txt",
                date: "2024-03-15",
                icon: "📄",
                content: "今天很累。\n\n想说的话打到一半。\n不想说了。\n\n删掉。",
                status: "deleted",
                read: false
            },
            {
                id: 2,
                name: "note_02.txt",
                date: "2024-06-22",
                icon: "📄",
                content: "想发一条消息。\n\n「最近还好吗」\n\n算了。\n谁会回答。\n\n删掉。",
                status: "deleted",
                read: false
            },
            {
                id: 3,
                name: "memo_03.txt",
                date: "2024-09-01",
                icon: "📝",
                content: "凌晨 02:47\n\n睡不着。\n\n练习室的灯很亮。\n亮得有点刺眼。\n\n但我喜欢。\n因为亮的时候不会想太多。\n\n…写这些干嘛。\n\n删掉。",
                status: "deleted",
                read: false
            },
            {
                id: 4,
                name: "img_04.jpg",
                date: "2024-10-15",
                icon: "🖼️",
                content: null,
                corrupted: true,
                status: "corrupted",
                read: false
            },
            {
                id: 5,
                name: "unsent_05.txt",
                date: "2024-11-11",
                icon: "💌",
                content: "写给某个人的。\n\n但我不知道你是谁。\n也许不存在。\n\n「今天发生了很好的事」\n「想让你知道」\n\n但不能这样。\n\n删掉。",
                status: "deleted",
                read: false
            },
            {
                id: 6,
                name: "night_06.txt",
                date: "2024-12-20",
                icon: "🌙",
                content: "凌晨 04:12\n\n又失眠了。\n\n今天在想一件事。\n…忘了。\n\n不重要。\n\n删掉。",
                status: "deleted",
                read: false
            }
        ];

        let readCount = 0;
        let repairAttempted = false;
        const totalFiles = trashFiles.filter(f => !f.corrupted).length;

        function loadReadStatus() {
            const saved = localStorage.getItem('hee_archive_v3');
            if (saved) {
                const userData = JSON.parse(saved);
                if (userData.trashReadCount) {
                    readCount = userData.trashReadCount;
                }
                if (userData.trashReadIds) {
                    userData.trashReadIds.forEach(id => {
                        const file = trashFiles.find(f => f.id === id);
                        if (file) file.read = true;
                    });
                }
                if (userData.trashRepairAttempted) {
                    repairAttempted = true;
                }
            }
            updateStats();
            updateProgress();
        }

        function saveReadStatus() {
            const saved = localStorage.getItem('hee_archive_v3');
            let userData = saved ? JSON.parse(saved) : {};
            const readIds = trashFiles.filter(f => f.read).map(f => f.id);
            userData.trashReadIds = readIds;
            userData.trashReadCount = readCount;
            userData.trashRepairAttempted = repairAttempted;
            localStorage.setItem('hee_archive_v3', JSON.stringify(userData));
            
            // 通知父窗口
            if (window.parent && window.parent.markTrashRead) {
                window.parent.markTrashRead(readCount);
            }
        }

        function markAsRead(fileId) {
            const file = trashFiles.find(f => f.id === fileId);
            if (file && !file.read && !file.corrupted) {
                file.read = true;
                readCount++;
                saveReadStatus();
                updateStats();
                updateProgress();
                
                // 显示已读提示
                const badge = document.getElementById(`badge_${fileId}`);
                if (badge) {
                    badge.innerHTML = ' ✓ 已读';
                    badge.style.color = '#4ade80';
                }
            }
        }

        function updateStats() {
            const statsEl = document.getElementById('trashStats');
            if (statsEl) {
                statsEl.innerHTML = `📄 已读: ${readCount}/${totalFiles}`;
                if (readCount >= totalFiles) {
                    statsEl.innerHTML = `📄 已读: ${readCount}/${totalFiles} ✨ 已完成 ✨`;
                    statsEl.style.color = '#ffd966';
                }
            }
        }

        function updateProgress() {
            const percent = (readCount / totalFiles) * 100;
            const fill = document.getElementById('progressFill');
            const text = document.getElementById('progressText');
            if (fill) fill.style.width = percent + '%';
            if (text) {
                if (readCount >= totalFiles) {
                    text.innerHTML = '✨ 已阅读所有被删除的草稿 ✨';
                    text.style.color = '#ffd966';
                } else {
                    text.innerHTML = `读者进度: 阅读 ${readCount}/${totalFiles} 份草稿 · 了解他的碎片`;
                    text.style.color = '#888';
                }
            }
        }

        function attemptRepair(fileId, btnElement) {
            if (repairAttempted) {
                alert('修复失败。原文件已被覆盖。');
                return;
            }
            
            repairAttempted = true;
            saveReadStatus();
            
            // 显示修复动画
            btnElement.textContent = '修复中...';
            btnElement.disabled = true;
            
            setTimeout(() => {
                btnElement.textContent = '修复失败';
                btnElement.style.background = '#4a2a2a';
                btnElement.style.borderColor = '#884444';
                
                const statusSpan = document.getElementById(`status_${fileId}`);
                if (statusSpan) {
                    statusSpan.innerHTML = '⚠️ 损坏 · 无法恢复';
                    statusSpan.style.color = '#ff6644';
                }
                
                // 触发聊天
                setTimeout(() => {
                    const chatWindow = window.parent.document.getElementById('chatWindow');
                    if (chatWindow && chatWindow.classList.contains('hidden')) {
                        chatWindow.classList.remove('hidden');
                    }
                }, 500);
            }, 1500);
        }

        function toggleFile(fileId) {
            const file = trashFiles.find(f => f.id === fileId);
            if (!file) return;
            
            const content = document.getElementById(`file-content-${fileId}`);
            if (content) {
                content.classList.toggle('open');
            }
            
            // 标记为已读
            if (!file.read && !file.corrupted) {
                markAsRead(fileId);
                
                // 显示通知
                const note = document.createElement('div');
                note.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#3a6ea5;padding:8px 16px;border-radius:8px;font-size:12px;z-index:1000;';
                note.textContent = '📖 已标记为已读';
                document.body.appendChild(note);
                setTimeout(() => note.remove(), 1500);
            }
        }

        function renderFileList() {
            const container = document.getElementById('fileList');
            
            if (!trashFiles.length) {
                container.innerHTML = '<div class="empty-trash">回收站是空的。</div>';
                return;
            }

            container.innerHTML = '';

            trashFiles.forEach(file => {
                const fileDiv = document.createElement('div');
                fileDiv.className = 'file-item';
                fileDiv.onclick = (e) => {
                    // 防止点击按钮时触发
                    if (e.target.tagName !== 'BUTTON') {
                        toggleFile(file.id);
                    }
                };

                let statusHtml = '';
                let repairHtml = '';
                
                if (file.corrupted) {
                    statusHtml = `<span class="corrupted" id="status_${file.id}">⚠️ 损坏</span>`;
                    if (!repairAttempted) {
                        repairHtml = `
                            <div class="repair-attempt">
                                <span>💡 文件已损坏。尝试修复？</span>
                                <button class="repair-btn" onclick="event.stopPropagation(); attemptRepair(${file.id}, this)">🔧 尝试修复</button>
                            </div>
                        `;
                    } else {
                        repairHtml = `<div class="repair-attempt"><span class="corrupted">❌ 修复失败。原文件已被覆盖。</span></div>`;
                    }
                } else {
                    statusHtml = `<span id="status_${file.id}">🗑️ 已删除 ${file.read ? '<span style="color:#4ade80;">✓ 已读</span>' : ''}</span>`;
                }

                const readBadge = file.read && !file.corrupted ? '<span class="read-badge">✓ 已读</span>' : '';
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'file-content';
                contentDiv.id = `file-content-${file.id}`;

                if (file.corrupted) {
                    contentDiv.innerHTML = `
                        <span class="corrupted">⚠️ 文件已损坏，无法查看。</span><br>
                        <span style="font-size:11px;color:#555;">文件名: ${file.name}</span><br>
                        ${repairHtml}
                    `;
                } else if (file.content) {
                    contentDiv.innerHTML = file.content.replace(/\n/g, '<br>');
                } else {
                    contentDiv.innerHTML = '<span style="color:#555;">文件内容为空。</span>';
                }

                fileDiv.innerHTML = `
                    <div class="file-header">
                        <div class="file-icon">${file.icon}</div>
                        <div class="file-info">
                            <div class="file-name">${file.name} ${readBadge}</div>
                            <div class="file-date">${file.date}</div>
                        </div>
                        <div class="file-status">${statusHtml}</div>
                    </div>
                `;
                
                fileDiv.appendChild(contentDiv);
                container.appendChild(fileDiv);
            });
        }

        renderFileList();
        loadReadStatus();

        console.log('%c🗑️ 这些是被删除的东西。有些连我自己都忘了写过。', 'color: #888;');
    </script>
</body>
</html>
