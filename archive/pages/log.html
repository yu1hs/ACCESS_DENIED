<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOG - HEE_ARCHIVE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            color: #ccc;
            padding: 30px;
            min-height: 100vh;
        }

        .log-header {
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .log-header h2 {
            color: #ffd966;
            font-size: 20px;
            letter-spacing: 2px;
        }

        .log-stats {
            font-size: 11px;
            color: #ffd966;
        }

        .log-entries {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 30px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .log-entry {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 12px;
        }

        .log-date {
            width: 100px;
            color: #ffd966;
            font-family: monospace;
        }

        .log-content {
            flex: 1;
            color: #aaa;
            line-height: 1.5;
        }

        .continue-section {
            margin-top: 30px;
            padding: 20px;
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            text-align: center;
        }

        .continue-section p {
            margin: 5px 0;
            font-size: 13px;
        }

        .continue-btn {
            background: #2a2a2a;
            border: 1px solid #4a4a4a;
            color: #ddd;
            padding: 10px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            margin-top: 15px;
            transition: all 0.2s;
        }

        .continue-btn:hover {
            background: #3a6ea5;
            border-color: #5a8aba;
            color: white;
        }

        .continue-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .response-msg {
            margin-top: 12px;
            font-size: 12px;
            color: #ffd966;
            display: none;
        }

        .response-msg.show {
            display: block;
        }

        .progress-section {
            margin-top: 20px;
            padding: 16px;
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
        }

        .progress-bar {
            background: #1a1a1a;
            border-radius: 10px;
            height: 6px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            background: #ffd966;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 11px;
            color: #888;
            margin-top: 8px;
            text-align: center;
        }

        .custom-log {
            margin-top: 20px;
            padding: 16px;
            background: #0a0a0a;
            border-left: 3px solid #ffd966;
            font-size: 12px;
            color: #aaa;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="log-header">
        <h2>📋 LOG</h2>
        <div class="log-stats" id="logStats">📖 已阅读全部</div>
    </div>

    <div id="logEntries" class="log-entries"></div>

    <div class="continue-section">
        <p>... 还有一些没写。</p>
        <p style="font-size:12px;color:#666;">写了也不会有人看。</p>
        <p style="font-size:12px;color:#666;">但你还是看到了。</p>
        <button id="continueBtn" class="continue-btn">📝 继续写吗</button>
        <div id="responseMsg" class="response-msg"></div>
    </div>

    <div id="customLogContainer" class="custom-log" style="display:none;"></div>

    <div class="progress-section">
        <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
        </div>
        <div id="progressText" class="progress-text"></div>
    </div>

    <script>
        const logData = [
            { date: "2024-03-11", content: "下雨。没出门。" },
            { date: "2024-03-15", content: "买了冰美式。太冰了。" },
            { date: "2024-04-02", content: "练习结束。累。" },
            { date: "2024-04-18", content: "今天有人说了「辛苦了」。没什么特别的意思。但听了还是有点…" },
            { date: "2024-05-07", content: "梦到以前的事。醒来忘了。" },
            { date: "2024-06-21", content: "夏至。白天很长。但待在室内没感觉。" },
            { date: "2024-07-30", content: "热。" },
            { date: "2024-08-14", content: "凌晨四点还没睡。看了以前的照片。不知道那时候在想什么。" },
            { date: "2024-09-02", content: "买了新耳机。音质还行。但旧的那副其实还没坏。" },
            { date: "2024-10-11", content: "风很大。树叶掉了很多。" },
            { date: "2024-11-23", content: "今天想联系一个人。想了很久。没联系。" },
            { date: "2024-12-31", content: "一年结束了。没什么特别的感想。明年再说。" }
        ];

        let userContinued = false;
        let hasReadAll = false;

        function loadUserChoice() {
            const saved = localStorage.getItem('hee_archive_v3');
            if (saved) {
                const userData = JSON.parse(saved);
                if (userData.logContinued) {
                    userContinued = true;
                    document.getElementById('responseMsg').innerHTML = '✨ 已记录。谢谢你。✨';
                    document.getElementById('responseMsg').classList.add('show');
                    const btn = document.getElementById('continueBtn');
                    if (btn) {
                        btn.disabled = true;
                        btn.style.opacity = '0.5';
                    }
                    // 显示自定义日志
                    if (userData.customLogs && userData.customLogs.length > 0) {
                        const container = document.getElementById('customLogContainer');
                        container.style.display = 'block';
                        container.innerHTML = `<span style="color:#ffd966;">📝 你留下的痕迹：</span><br><br>`;
                        userData.customLogs.forEach(log => {
                            container.innerHTML += `📅 ${log.date}<br>“${log.content}”<br><br>`;
                        });
                    }
                }
                // 检查是否阅读完所有日志
                if (userData.viewedLogs !== undefined && userData.viewedLogs >= logData.length) {
                    hasReadAll = true;
                }
            }
            updateProgress();
            updateStats();
        }

        function updateProgress() {
            const fill = document.getElementById('progressFill');
            const text = document.getElementById('progressText');
            if (fill && text) {
                if (userContinued) {
                    fill.style.width = '100%';
                    text.innerHTML = '✨ 已完成 · 你选择了「继续写」 ✨';
                    text.style.color = '#ffd966';
                } else {
                    fill.style.width = '0%';
                    text.innerHTML = '💭 点击「继续写」 · 给羲承留下你的回应';
                    text.style.color = '#888';
                }
            }
        }

        function updateStats() {
            const statsEl = document.getElementById('logStats');
            if (statsEl) {
                if (hasReadAll) {
                    statsEl.innerHTML = '📖 已阅读全部日志 ✨';
                    statsEl.style.color = '#ffd966';
                } else {
                    statsEl.innerHTML = `📖 阅读进度: 滚动浏览全部日志`;
                    statsEl.style.color = '#888';
                }
            }
        }

        function markLogAsRead() {
            const saved = localStorage.getItem('hee_archive_v3');
            let userData = saved ? JSON.parse(saved) : {};
            if (!userData.viewedLogs) userData.viewedLogs = 0;
            userData.viewedLogs = logData.length;
            localStorage.setItem('hee_archive_v3', JSON.stringify(userData));
            hasReadAll = true;
            updateStats();
            
            // 通知父窗口
            if (window.parent && window.parent.markLogRead) {
                window.parent.markLogRead();
            }
        }

        function renderLogs() {
            const container = document.getElementById('logEntries');
            container.innerHTML = '';
            
            logData.forEach((entry, index) => {
                const div = document.createElement('div');
                div.className = 'log-entry';
                div.setAttribute('data-index', index);
                div.innerHTML = `
                    <div class="log-date">${entry.date}</div>
                    <div class="log-content">${entry.content}</div>
                `;
                container.appendChild(div);
            });
            
            // 检测滚动到底部（表示已阅读）
            container.addEventListener('scroll', function() {
                if (container.scrollTop + container.clientHeight >= container.scrollHeight - 50) {
                    if (!hasReadAll) {
                        markLogAsRead();
                    }
                }
            });
        }

        function continueWriting() {
            if (userContinued) return;
            
            userContinued = true;
            
            const saved = localStorage.getItem('hee_archive_v3');
            let userData = saved ? JSON.parse(saved) : {};
            userData.logContinued = true;
            userData.logContinuedDate = new Date().toISOString();
            
            // 添加一条新日志
            const today = new Date().toISOString().slice(0, 10);
            const customMsg = "有人选了「继续写」。";
            if (!userData.customLogs) userData.customLogs = [];
            userData.customLogs.push({
                date: today,
                content: customMsg
            });
            
            localStorage.setItem('hee_archive_v3', JSON.stringify(userData));
            
            document.getElementById('responseMsg').innerHTML = '✨ 已记录。谢谢你。✨';
            document.getElementById('responseMsg').classList.add('show');
            const btn = document.getElementById('continueBtn');
            btn.disabled = true;
            btn.style.opacity = '0.5';
            
            // 显示自定义日志
            const container = document.getElementById('customLogContainer');
            container.style.display = 'block';
            container.innerHTML = `<span style="color:#ffd966;">📝 你留下的痕迹：</span><br><br>`;
            userData.customLogs.forEach(log => {
                container.innerHTML += `📅 ${log.date}<br>“${log.content}”<br><br>`;
            });
            
            updateProgress();
            
            // 记录对话
            if (!userData.conversations) userData.conversations = [];
            userData.conversations.push({ type: 'log_continue', time: Date.now() });
            localStorage.setItem('hee_archive_v3', JSON.stringify(userData));
            
            // 通知父窗口
            if (window.parent && window.parent.continueLog) {
                window.parent.continueLog();
            }
            
            // 显示成功提示
            const successMsg = document.createElement('div');
            successMsg.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#3a6ea5;color:white;padding:8px 16px;border-radius:8px;font-size:12px;z-index:1000;';
            successMsg.textContent = '📝 已记录到日志中';
            document.body.appendChild(successMsg);
            setTimeout(() => successMsg.remove(), 2000);
            
            // 触发聊天
            setTimeout(() => {
                const chatWindow = window.parent.document.getElementById('chatWindow');
                if (chatWindow && chatWindow.classList.contains('hidden')) {
                    chatWindow.classList.remove('hidden');
                }
            }, 500);
        }

        document.getElementById('continueBtn').addEventListener('click', continueWriting);
        
        renderLogs();
        loadUserChoice();
    </script>
</body>
</html>
