<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOME - HEE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', 'Courier New', monospace;
            color: #ccc;
            padding: 30px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .home-container {
            max-width: 600px;
            text-align: center;
        }
        .ascii-art {
            font-family: monospace;
            font-size: 10px;
            color: #3a6ea5;
            margin: 30px 0;
            white-space: pre;
            line-height: 1.2;
        }
        .welcome-message {
            font-size: 14px;
            line-height: 1.8;
            color: #aaa;
            border-left: 3px solid #ffd966;
            padding-left: 20px;
            margin-bottom: 30px;
            text-align: left;
        }
        .stats {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 20px;
            margin-top: 30px;
            font-size: 12px;
            text-align: left;
        }
        .stats h4 { color: #ffd966; margin-bottom: 12px; font-size: 13px; }
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #222;
        }
        .stat-label { color: #777; }
        .stat-value { color: #ddd; }
        .footer-note {
            margin-top: 30px;
            font-size: 11px;
            color: #555;
            font-style: italic;
        }
        @media (max-width: 600px) {
            body { padding: 20px; }
            .welcome-message { font-size: 12px; }
            .ascii-art { font-size: 8px; }
        }
    </style>
</head>
<body>
    <div class="home-container">
        <div class="ascii-art">
            ┌─────────────────────────────────────┐
            │                                     │
            │          H E E _ A R C H I V E      │
            │                                     │
            │   「你找到的不是一个人的秘密       │
            │     而是一个人愿意留下来的痕迹」    │
            │                                     │
            └─────────────────────────────────────┘
        </div>

        <div class="welcome-message" id="welcomeMessage">
            Welcome to HEE_ARCHIVE.
            <br><br>
            这个网站曾经有主人。
            <br>
            现在没有了。
            <br><br>
            如果你想找什么，请自便。
            <br>
            但大部分东西不在。
            <br><br>
            —— 系统自动生成
        </div>

        <div class="stats">
            <h4>📊 访问记录</h4>
            <div class="stat-row">
                <span class="stat-label">首次访问</span>
                <span class="stat-value" id="firstVisit">--</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">总访问次数</span>
                <span class="stat-value" id="visitCount">--</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">当前第几天</span>
                <span class="stat-value" id="currentDay">--</span>
            </div>
        </div>

        <div class="footer-note" id="randomQuote"></div>
    </div>

    <script>
        function loadData() {
            const saved = localStorage.getItem('hee_archive_dialogue');
            if (saved) {
                const userData = JSON.parse(saved);
                document.getElementById('firstVisit').textContent = userData.firstVisit ? new Date(userData.firstVisit).toLocaleDateString() : '今天';
                document.getElementById('visitCount').textContent = userData.visitCount || 1;
                document.getElementById('currentDay').textContent = `${userData.day || 1}/7`;
            } else {
                document.getElementById('firstVisit').textContent = '今天';
                document.getElementById('visitCount').textContent = '1';
                document.getElementById('currentDay').textContent = '1/7';
            }
            
            const quotes = [
                "「不用记得我。但如果你想，也可以。」",
                "「凌晨的时候，想法会比较真实。」",
                "「有些话没说完，是因为说到一半就不想说了。」",
                "「这个网站不会关。至少我不会主动关。」",
                "「你每次点开这个页面的时候，在想什么。」"
            ];
            document.getElementById('randomQuote').textContent = quotes[Math.floor(Math.random() * quotes.length)];
        }
        
        loadData();
        
        window.addEventListener('storage', function(e) {
            if (e.key === 'hee_archive_dialogue') {
                loadData();
            }
        });
        
        setInterval(loadData, 5000);
    </script>
</body>
</html>
