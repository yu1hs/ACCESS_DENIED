<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUDIO - HEE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', 'Courier New', monospace;
            color: #ccc;
            padding: 20px;
            min-height: 100vh;
        }
        .audio-header {
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 10px;
        }
        .audio-header h2 { color: #ffd966; font-size: 20px; }
        .audio-stats { font-size: 11px; color: #ffd966; }
        .audio-list { display: flex; flex-direction: column; gap: 12px; }
        .audio-item {
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            transition: all 0.2s;
        }
        .audio-item:hover { border-color: #3a6ea5; }
        .audio-control {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            gap: 15px;
            cursor: pointer;
        }
        .play-btn {
            width: 44px;
            height: 44px;
            background: #1a1a1a;
            border: 1px solid #4a4a4a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .play-btn:hover { background: #3a6ea5; border-color: #5a8aba; }
        .play-btn.playing { background: #3a6ea5; animation: pulse 1s ease infinite; }
        .play-btn.damaged { background: #2a1a1a; border-color: #884444; }
        .play-btn.damaged:hover { background: #662222; }
        .play-btn.semi-damaged { background: #2a2a1a; border-color: #888844; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.6;} }
        .audio-info { flex: 1; }
        .audio-title { font-size: 14px; color: #ddd; font-family: monospace; }
        .audio-duration { font-size: 10px; color: #666; margin-top: 3px; }
        .audio-note { font-size: 11px; color: #888; font-style: italic; margin-top: 4px; }
        .damaged-badge { color: #ff6644; font-size: 10px; margin-left: 8px; }
        .semi-badge { color: #ffaa44; font-size: 10px; margin-left: 8px; }
        .transcript {
            display: none;
            padding: 16px;
            border-top: 1px solid #222;
            background: #080808;
            font-size: 13px;
            line-height: 1.6;
            color: #aaa;
        }
        .transcript.open { display: block; }
        .transcript.damaged { color: #664444; font-style: italic; }
        .progress-section {
            margin-top: 30px;
            padding: 16px;
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
        }
        .progress-bar { background: #1a1a1a; border-radius: 10px; height: 6px; overflow: hidden; margin-top: 8px; }
        .progress-fill { background: #ffd966; height: 100%; width: 0%; transition: width 0.3s; }
        .progress-text { font-size: 11px; color: #888; margin-top: 8px; text-align: center; }
        .footer-note { margin-top: 30px; text-align: center; font-size: 11px; color: #555; padding-top: 20px; border-top: 1px solid #222; }
        
        @media (max-width: 600px) {
            body { padding: 15px; }
            .play-btn { width: 40px; height: 40px; font-size: 18px; }
            .audio-title { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="audio-header">
        <h2>🎧 AUDIO ARCHIVE</h2>
        <div class="audio-stats" id="audioStats">🎧 已播放: 0 次</div>
    </div>
    <div id="audioList" class="audio-list"></div>
    <div class="progress-section">
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        <div id="progressText" class="progress-text"></div>
    </div>
    <div class="footer-note">💡 点击播放 · 大部分录音已经损坏<br>📝 可以查看转录文字了解内容</div>

    <script>
        const audioFiles = [
            { 
                id: 1, 
                title: "损坏的录音 #1", 
                duration: "00:05", 
                transcript: "[录音损坏，无法播放]\n\n只剩下沙沙的杂音。什么也听不清。", 
                note: "文件已损坏。",
                type: "damaged"
            },
            { 
                id: 2, 
                title: "窗外的雨声", 
                duration: "00:08", 
                transcript: "[雨声，但夹杂着杂音]\n\n能听到雨声。但不是很清楚。\n像是隔着什么在录。", 
                note: "下雨天。录音有点问题。",
                type: "semi-damaged"
            },
            { 
                id: 3, 
                title: "便利店开门声", 
                duration: "00:06", 
                transcript: "[风铃声，然后自动门打开的声音]\n\n凌晨两点的便利店。\n只有我一个人。", 
                note: "凌晨两点。买了冰美式。",
                type: "bell"
            },
            { 
                id: 4, 
                title: "损坏的录音 #2", 
                duration: "00:05", 
                transcript: "[录音损坏，无法播放]\n\n电流声。还有很远的说话声。\n但听不清在说什么。", 
                note: "文件已损坏。",
                type: "damaged"
            },
            { 
                id: 5, 
                title: "损坏的录音 #3", 
                duration: "00:05", 
                transcript: "[没有录音内容]\n\n只有杂音。\n什么都没有录到。", 
                note: "空白录音。",
                type: "damaged"
            }
        ];

        let playCount = 0;
        let currentlyPlaying = null;
        let currentAudio = null;
        let currentContext = null;
        const targetPlays = 3;

        function loadPlayCount() {
            const saved = localStorage.getItem('hee_archive_dialogue');
            if (saved) {
                const userData = JSON.parse(saved);
                playCount = userData.audioPlayCount || 0;
                updateStatsDisplay();
                updateProgress();
            }
        }

        function savePlayCount() {
            const saved = localStorage.getItem('hee_archive_dialogue');
            let userData = saved ? JSON.parse(saved) : {};
            userData.audioPlayCount = playCount;
            localStorage.setItem('hee_archive_dialogue', JSON.stringify(userData));
            
            if (window.parent && window.parent.playAudio) {
                window.parent.playAudio();
            }
        }

        function updateStatsDisplay() {
            const statsEl = document.getElementById('audioStats');
            if (statsEl) {
                statsEl.innerHTML = `🎧 已播放: ${playCount} 次`;
                if (playCount >= targetPlays) {
                    statsEl.innerHTML = `🎧 已播放: ${playCount} 次 ✨ 已完成 ✨`;
                    statsEl.style.color = '#ffd966';
                }
            }
        }

        function updateProgress() {
            const percent = Math.min(100, (playCount / targetPlays) * 100);
            const fill = document.getElementById('progressFill');
            const text = document.getElementById('progressText');
            if (fill) fill.style.width = percent + '%';
            if (text) {
                if (playCount >= targetPlays) {
                    text.innerHTML = '✨ 已收听足够音频 · 继续探索其他内容 ✨';
                    text.style.color = '#ffd966';
                } else {
                    text.innerHTML = `收听进度: ${playCount}/${targetPlays} 段音频 · 听他说的话`;
                    text.style.color = '#888';
                }
            }
        }

        // 完全损坏音效（白噪音）
        function playDamagedSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const bufferSize = 4096;
                const noise = ctx.createScriptProcessor(bufferSize, 1, 1);
                noise.onaudioprocess = function(e) {
                    const output = e.outputBuffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        output[i] = Math.random() * 0.08 - 0.04;
                    }
                };
                const gain = ctx.createGain();
                noise.connect(gain);
                gain.connect(ctx.destination);
                gain.gain.setValueAtTime(0.08, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2);
                
                setTimeout(() => {
                    noise.disconnect();
                    ctx.close();
                }, 2000);
                return ctx;
            } catch(e) {
                return null;
            }
        }

        // 半损坏雨声（雨声 + 杂音）
        function playSemiDamagedRain() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                
                // 雨声（白噪音滤波）
                const bufferSize = 4096;
                const noise = ctx.createScriptProcessor(bufferSize, 1, 1);
                noise.onaudioprocess = function(e) {
                    const output = e.outputBuffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        output[i] = Math.random() * 0.06 - 0.03;
                    }
                };
                
                // 杂音（更高的随机频率）
                const glitch = ctx.createScriptProcessor(bufferSize, 1, 1);
                glitch.onaudioprocess = function(e) {
                    const output = e.outputBuffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        output[i] = Math.random() * 0.04 - 0.02;
                    }
                };
                
                const gainNoise = ctx.createGain();
                const gainGlitch = ctx.createGain();
                const masterGain = ctx.createGain();
                
                noise.connect(gainNoise);
                glitch.connect(gainGlitch);
                gainNoise.connect(masterGain);
                gainGlitch.connect(masterGain);
                masterGain.connect(ctx.destination);
                
                gainNoise.gain.setValueAtTime(0.06, ctx.currentTime);
                gainNoise.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 3);
                gainGlitch.gain.setValueAtTime(0.04, ctx.currentTime);
                gainGlitch.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2.5);
                masterGain.gain.setValueAtTime(0.3, ctx.currentTime);
                
                setTimeout(() => {
                    noise.disconnect();
                    glitch.disconnect();
                    ctx.close();
                }, 3000);
                return ctx;
            } catch(e) {
                return null;
            }
        }

        // 便利店风铃声（正常）
        function playBellSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const now = ctx.currentTime;
                
                const notes = [880, 1047, 1319, 880, 784, 659, 880];
                notes.forEach((freq, index) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.12, now + index * 0.12);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + index * 0.12 + 0.8);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now + index * 0.12);
                    osc.stop(now + index * 0.12 + 0.8);
                });
                
                setTimeout(() => ctx.close(), 2000);
                return ctx;
            } catch(e) {
                return null;
            }
        }

        function playAudioFile(fileId, btnElement, audioFile) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            if (currentContext) {
                currentContext.close();
                currentContext = null;
            }
            
            if (currentlyPlaying === fileId) {
                currentlyPlaying = null;
                btnElement.textContent = '▶';
                btnElement.classList.remove('playing');
                return;
            }
            
            if (currentlyPlaying && currentlyPlaying !== fileId) {
                const prevBtn = document.getElementById(`playBtn${currentlyPlaying}`);
                if (prevBtn) {
                    prevBtn.textContent = '▶';
                    prevBtn.classList.remove('playing');
                }
            }
            
            currentlyPlaying = fileId;
            btnElement.textContent = '⏸';
            btnElement.classList.add('playing');
            
            let duration = 2500;
            
            if (audioFile.type === 'damaged') {
                currentContext = playDamagedSound();
                duration = 2500;
            } else if (audioFile.type === 'semi-damaged') {
                currentContext = playSemiDamagedRain();
                duration = 3500;
            } else if (audioFile.type === 'bell') {
                currentContext = playBellSound();
                duration = 2500;
            } else {
                currentContext = playDamagedSound();
                duration = 2500;
            }
            
            setTimeout(() => {
                if (currentlyPlaying === fileId) {
                    currentlyPlaying = null;
                    btnElement.textContent = '▶';
                    btnElement.classList.remove('playing');
                }
            }, duration);
            
            playCount++;
            savePlayCount();
            updateStatsDisplay();
            updateProgress();
        }

        function renderAudioList() {
            const container = document.getElementById('audioList');
            container.innerHTML = '';
            audioFiles.forEach(file => {
                const item = document.createElement('div');
                item.className = 'audio-item';
                
                let btnClass = '';
                let badge = '';
                if (file.type === 'damaged') {
                    btnClass = 'damaged';
                    badge = '<span class="damaged-badge">⚠️ 损坏</span>';
                } else if (file.type === 'semi-damaged') {
                    btnClass = 'semi-damaged';
                    badge = '<span class="semi-badge">⚠️ 部分损坏</span>';
                }
                
                const transcriptClass = file.type !== 'bell' ? 'damaged' : '';
                
                item.innerHTML = `
                    <div class="audio-control" onclick="toggleTranscript(${file.id})">
                        <div class="play-btn ${btnClass}" id="playBtn${file.id}" onclick="event.stopPropagation(); playAudio(${file.id}, this)">▶</div>
                        <div class="audio-info">
                            <div class="audio-title">${file.title} ${badge}</div>
                            <div class="audio-duration">${file.duration}</div>
                            <div class="audio-note">💬 ${file.note}</div>
                        </div>
                    </div>
                    <div class="transcript ${transcriptClass}" id="transcript${file.id}">
                        <span style="color:#888;">📝 转录文本:</span><br>
                        "${file.transcript}"
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function toggleTranscript(fileId) {
            const transcript = document.getElementById(`transcript${fileId}`);
            if (transcript) transcript.classList.toggle('open');
        }

        function playAudio(fileId, btnElement) {
            const file = audioFiles.find(f => f.id === fileId);
            if (file) {
                playAudioFile(fileId, btnElement, file);
            }
        }

        window.toggleTranscript = toggleTranscript;
        window.playAudio = playAudio;

        renderAudioList();
        loadPlayCount();
    </script>
</body>
</html>
