<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUDIO - HEE_ARCHIVE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', 'Courier New', monospace;
            color: #ccc;
            padding: 30px;
            min-height: 100vh;
        }

        .audio-header {
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .audio-header h2 {
            color: #ffd966;
            font-size: 20px;
            letter-spacing: 2px;
        }

        .audio-stats {
            font-size: 11px;
            color: #ffd966;
        }

        .audio-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .audio-item {
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .audio-item:hover {
            border-color: #3a6ea5;
        }

        .audio-control {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            gap: 15px;
            cursor: pointer;
        }

        .play-btn {
            width: 40px;
            height: 40px;
            background: #1a1a1a;
            border: 1px solid #4a4a4a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .play-btn:hover {
            background: #3a6ea5;
            border-color: #5a8aba;
        }

        .play-btn.playing {
            background: #3a6ea5;
            animation: pulse 1s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .audio-info {
            flex: 1;
        }

        .audio-title {
            font-size: 14px;
            color: #ddd;
            font-family: monospace;
        }

        .audio-duration {
            font-size: 10px;
            color: #666;
            margin-top: 3px;
        }

        .audio-note {
            font-size: 11px;
            color: #888;
            font-style: italic;
            margin-top: 4px;
        }

        .transcript {
            display: none;
            padding: 16px;
            border-top: 1px solid #222;
            background: #080808;
            font-size: 13px;
            line-height: 1.6;
            color: #aaa;
        }

        .transcript.open {
            display: block;
        }

        .progress-section {
            margin-top: 30px;
            padding: 16px;
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
        }

        .progress-bar {
            background: #1a1a1a;
            border-radius: 10px;
            height: 6px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            background: #ffd966;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 11px;
            color: #888;
            margin-top: 8px;
            text-align: center;
        }

        .footer-note {
            margin-top: 30px;
            text-align: center;
            font-size: 11px;
            color: #555;
            padding-top: 20px;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>
    <div class="audio-header">
        <h2>🎧 AUDIO ARCHIVE</h2>
        <div class="audio-stats" id="audioStats">已播放: 0 次</div>
    </div>

    <div id="audioList" class="audio-list"></div>

    <div class="progress-section">
        <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
        </div>
        <div id="progressText" class="progress-text"></div>
    </div>

    <div class="footer-note">
        💡 点击播放 · 录音时没想到有人会听，所以不完整<br>
        📝 可以查看转录文字了解内容
    </div>

    <script>
        // 音频数据
        const audioFiles = [
            {
                id: 1,
                title: "voice_01",
                duration: "00:06",
                transcript: "今天结束得有点晚。",
                note: "录的时候没想到有人会听。"
            },
            {
                id: 2,
                title: "voice_02",
                duration: "00:12",
                transcript: "再来一次。...算了，今天就这样。",
                note: "练习室。那天很累。"
            },
            {
                id: 3,
                title: "voice_03",
                duration: "00:08",
                transcript: "下雨了。忘记带伞了。...也不是第一次了。",
                note: "便利店门口。"
            },
            {
                id: 4,
                title: "voice_04",
                duration: "00:05",
                transcript: "想说什么来着。...忘了。",
                note: "深夜。"
            },
            {
                id: 5,
                title: "voice_05",
                duration: "00:15",
                transcript: "如果有人的话。...算了。",
                note: "未完成。"
            }
        ];

        let playCount = 0;
        let currentlyPlaying = null;
        let currentAudio = null;
        const targetPlays = 2;  // 读者结局需要的播放次数

        // 加载播放统计
        function loadPlayCount() {
            const saved = localStorage.getItem('hee_archive_v3');
            if (saved) {
                const userData = JSON.parse(saved);
                playCount = userData.audioPlayCount || 0;
                updateStatsDisplay();
                updateProgress();
            }
        }

        function savePlayCount() {
            const saved = localStorage.getItem('hee_archive_v3');
            let userData = saved ? JSON.parse(saved) : {};
            userData.audioPlayCount = playCount;
            localStorage.setItem('hee_archive_v3', JSON.stringify(userData));
            
            // 通知父窗口（触发结局检查）
            if (window.parent && window.parent.playAudio) {
                window.parent.playAudio();
            }
        }

        function updateStatsDisplay() {
            const statsEl = document.getElementById('audioStats');
            if (statsEl) {
                statsEl.textContent = `🎧 已播放: ${playCount} 次`;
                if (playCount >= targetPlays) {
                    statsEl.style.color = '#ffd966';
                    statsEl.innerHTML = `🎧 已播放: ${playCount} 次 ✨ 已达到条件 ✨`;
                }
            }
        }

        function updateProgress() {
            const percent = Math.min(100, (playCount / targetPlays) * 100);
            const fill = document.getElementById('progressFill');
            const text = document.getElementById('progressText');
            if (fill) fill.style.width = percent + '%';
            if (text) {
                if (playCount >= targetPlays) {
                    text.innerHTML = '✨ 已收听足够音频 · 继续探索其他内容 ✨';
                    text.style.color = '#ffd966';
                } else {
                    text.innerHTML = `读者进度: 收听 ${playCount}/${targetPlays} 段音频 · 听他说的话`;
                    text.style.color = '#888';
                }
            }
        }

        // 创建模拟音频（用 Web Audio API 生成简单音效）
        function createBeepSound(duration, frequency = 440) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = frequency;
                gainNode.gain.value = 0.1;
                
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + duration);
                oscillator.stop(audioContext.currentTime + duration);
                
                return audioContext;
            } catch(e) {
                return null;
            }
        }

        function playMockAudio(fileId, playBtn) {
            // 停止当前播放
            if (currentAudio) {
                currentAudio.close();
                currentAudio = null;
            }
            
            // 更新按钮状态
            if (currentlyPlaying && currentlyPlaying !== fileId) {
                const prevBtn = document.getElementById(`playBtn${currentlyPlaying}`);
                if (prevBtn) {
                    prevBtn.textContent = '▶';
                    prevBtn.classList.remove('playing');
                }
            }
            
            if (currentlyPlaying === fileId) {
                // 停止播放
                currentlyPlaying = null;
                playBtn.textContent = '▶';
                playBtn.classList.remove('playing');
                return;
            }
            
            // 播放新音频
            currentlyPlaying = fileId;
            playBtn.textContent = '⏸';
            playBtn.classList.add('playing');
            
            // 增加播放次数
            playCount++;
            savePlayCount();
            updateStatsDisplay();
            updateProgress();
            
            // 模拟播放（实际项目中替换为真实音频文件）
            const audioContext = createBeepSound(3, 400 + fileId * 30);
            currentAudio = audioContext;
            
            // 显示播放提示
            const file = audioFiles.find(f => f.id === fileId);
            const playingMsg = document.createElement('div');
            playingMsg.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#3a6ea5;padding:8px 16px;border-radius:8px;font-size:12px;z-index:1000;';
            playingMsg.textContent = `🎵 正在播放: ${file.title}`;
            document.body.appendChild(playingMsg);
            setTimeout(() => playingMsg.remove(), 2000);
            
            // 3秒后自动停止
            setTimeout(() => {
                if (currentlyPlaying === fileId) {
                    currentlyPlaying = null;
                    playBtn.textContent = '▶';
                    playBtn.classList.remove('playing');
                }
            }, 3000);
        }

        function renderAudioList() {
            const container = document.getElementById('audioList');
            container.innerHTML = '';

            audioFiles.forEach(file => {
                const item = document.createElement('div');
                item.className = 'audio-item';
                
                item.innerHTML = `
                    <div class="audio-control" onclick="toggleTranscript(${file.id})">
                        <div class="play-btn" id="playBtn${file.id}" onclick="event.stopPropagation(); playAudio(${file.id}, this)">
                            ▶
                        </div>
                        <div class="audio-info">
                            <div class="audio-title">${file.title}</div>
                            <div class="audio-duration">${file.duration}</div>
                            <div class="audio-note">💬 ${file.note}</div>
                        </div>
                    </div>
                    <div class="transcript" id="transcript${file.id}">
                        <span style="color:#888;">📝 转录文本:</span><br>
                        "${file.transcript}"
                    </div>
                `;

                container.appendChild(item);
            });
        }

        function toggleTranscript(fileId) {
            const transcript = document.getElementById(`transcript${fileId}`);
            if (transcript) {
                transcript.classList.toggle('open');
            }
        }

        function playAudio(fileId, btnElement) {
            playMockAudio(fileId, btnElement);
        }

        // 暴露全局函数
        window.toggleTranscript = toggleTranscript;
        window.playAudio = playAudio;

        // 初始化
        renderAudioList();
        loadPlayCount();
    </script>
</body>
</html>
