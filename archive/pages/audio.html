<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUDIO - HEE_ARCHIVE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', 'Courier New', monospace;
            color: #ccc;
            padding: 30px;
            min-height: 100vh;
        }

        .audio-header {
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .audio-header h2 {
            color: #ffd966;
            font-size: 20px;
            letter-spacing: 2px;
        }

        .audio-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .audio-item {
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .audio-item:hover {
            border-color: #3a6ea5;
        }

        .audio-control {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            gap: 15px;
            cursor: pointer;
        }

        .play-btn {
            width: 40px;
            height: 40px;
            background: #1a1a1a;
            border: 1px solid #4a4a4a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .play-btn:hover {
            background: #3a6ea5;
            border-color: #5a8aba;
        }

        .play-btn.playing {
            background: #3a6ea5;
            animation: pulse 1s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .audio-info {
            flex: 1;
        }

        .audio-title {
            font-size: 14px;
            color: #ddd;
            font-family: monospace;
        }

        .audio-duration {
            font-size: 10px;
            color: #666;
            margin-top: 3px;
        }

        .audio-note {
            font-size: 11px;
            color: #888;
            font-style: italic;
        }

        .transcript {
            display: none;
            padding: 16px;
            border-top: 1px solid #222;
            background: #080808;
            font-size: 13px;
            line-height: 1.6;
            color: #aaa;
        }

        .transcript.open {
            display: block;
        }

        .footer-note {
            margin-top: 30px;
            text-align: center;
            font-size: 11px;
            color: #555;
            padding: 16px;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>
    <div class="audio-header">
        <h2>🎧 AUDIO ARCHIVE</h2>
    </div>

    <div id="audioList" class="audio-list"></div>

    <div class="footer-note">
        💡 点击播放 · 录音时没想到有人会听，所以不完整
    </div>

    <script>
        // 音频数据（模拟，实际可替换为真实音频文件）
        const audioFiles = [
            {
                id: 1,
                title: "voice_01",
                duration: "00:06",
                transcript: "今天结束得有点晚。",
                note: "录的时候没想到有人会听。"
            },
            {
                id: 2,
                title: "voice_02",
                duration: "00:12",
                transcript: "再来一次。...算了，今天就这样。",
                note: "练习室。那天很累。"
            },
            {
                id: 3,
                title: "voice_03",
                duration: "00:08",
                transcript: "下雨了。忘记带伞了。...也不是第一次了。",
                note: "便利店门口。"
            },
            {
                id: 4,
                title: "voice_04",
                duration: "00:05",
                transcript: "想说什么来着。...忘了。",
                note: "深夜。"
            },
            {
                id: 5,
                title: "voice_05",
                duration: "00:15",
                transcript: "如果有人的话。...算了。",
                note: "未完成。"
            }
        ];

        let currentlyPlaying = null;
        let currentAudio = null;

        // 创建模拟音频（用 Web Audio API 生成简单音效）
        function createBeepSound(duration, frequency = 440) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            gainNode.gain.value = 0.1;
            
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + duration);
            oscillator.stop(audioContext.currentTime + duration);
            
            return audioContext;
        }

        function playMockAudio(fileId, playBtn) {
            // 停止当前播放
            if (currentAudio) {
                currentAudio.close();
                currentAudio = null;
            }
            
            // 更新按钮状态
            if (currentlyPlaying && currentlyPlaying !== fileId) {
                const prevBtn = document.getElementById(`playBtn${currentlyPlaying}`);
                if (prevBtn) {
                    prevBtn.textContent = '▶';
                    prevBtn.classList.remove('playing');
                }
            }
            
            if (currentlyPlaying === fileId) {
                // 停止播放
                currentlyPlaying = null;
                playBtn.textContent = '▶';
                playBtn.classList.remove('playing');
                return;
            }
            
            // 播放新音频
            currentlyPlaying = fileId;
            playBtn.textContent = '⏸';
            playBtn.classList.add('playing');
            
            // 模拟播放（实际项目中替换为真实音频文件）
            const audioContext = createBeepSound(3, 400 + fileId * 30);
            currentAudio = audioContext;
            
            // 3秒后自动停止
            setTimeout(() => {
                if (currentlyPlaying === fileId) {
                    currentlyPlaying = null;
                    playBtn.textContent = '▶';
                    playBtn.classList.remove('playing');
                }
            }, 3000);
        }

        function renderAudioList() {
            const container = document.getElementById('audioList');
            container.innerHTML = '';

            audioFiles.forEach(file => {
                const item = document.createElement('div');
                item.className = 'audio-item';

                const isPlayingClass = currentlyPlaying === file.id ? 'playing' : '';
                
                item.innerHTML = `
                    <div class="audio-control" onclick="toggleTranscript(${file.id})">
                        <div class="play-btn" id="playBtn${file.id}" onclick="event.stopPropagation(); playAudio(${file.id}, this)">
                            ▶
                        </div>
                        <div class="audio-info">
                            <div class="audio-title">${file.title}</div>
                            <div class="audio-duration">${file.duration}</div>
                            <div class="audio-note">${file.note}</div>
                        </div>
                    </div>
                    <div class="transcript" id="transcript${file.id}">
                        <span style="color:#888;">📝 转录文本:</span><br>
                        "${file.transcript}"
                    </div>
                `;

                container.appendChild(item);
            });
        }

        function toggleTranscript(fileId) {
            const transcript = document.getElementById(`transcript${fileId}`);
            if (transcript) {
                transcript.classList.toggle('open');
            }
        }

        function playAudio(fileId, btnElement) {
            playMockAudio(fileId, btnElement);
            
            // 记录播放行为
            const saved = localStorage.getItem('hee_archive_user');
            if (saved) {
                let userData = JSON.parse(saved);
                if (!userData.audioPlays) userData.audioPlays = [];
                userData.audioPlays.push({ id: fileId, time: Date.now() });
                localStorage.setItem('hee_archive_user', JSON.stringify(userData));
            }
        }

        window.toggleTranscript = toggleTranscript;
        window.playAudio = playAudio;

        renderAudioList();
    </script>
</body>
</html>
