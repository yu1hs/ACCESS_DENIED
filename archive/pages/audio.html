<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUDIO - HEE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', 'Courier New', monospace;
            color: #ccc;
            padding: 20px;
            min-height: 100vh;
        }
        .audio-header {
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 10px;
        }
        .audio-header h2 { color: #ffd966; font-size: 20px; }
        .audio-stats { font-size: 11px; color: #ffd966; }
        .audio-list { display: flex; flex-direction: column; gap: 12px; }
        .audio-item {
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            transition: all 0.2s;
        }
        .audio-item:hover { border-color: #3a6ea5; }
        .audio-control {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            gap: 15px;
            cursor: pointer;
        }
        .play-btn {
            width: 44px;
            height: 44px;
            background: #1a1a1a;
            border: 1px solid #4a4a4a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .play-btn:hover { background: #3a6ea5; border-color: #5a8aba; }
        .play-btn.playing { background: #3a6ea5; animation: pulse 1s ease infinite; }
        .play-btn.damaged { background: #2a1a1a; border-color: #884444; }
        .play-btn.damaged:hover { background: #662222; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.6;} }
        .audio-info { flex: 1; }
        .audio-title { font-size: 14px; color: #ddd; font-family: monospace; }
        .audio-duration { font-size: 10px; color: #666; margin-top: 3px; }
        .audio-note { font-size: 11px; color: #888; font-style: italic; margin-top: 4px; }
        .damaged-badge { color: #ff6644; font-size: 10px; margin-left: 8px; }
        .transcript {
            display: none;
            padding: 16px;
            border-top: 1px solid #222;
            background: #080808;
            font-size: 13px;
            line-height: 1.6;
            color: #aaa;
        }
        .transcript.open { display: block; }
        .transcript.damaged { color: #664444; font-style: italic; }
        .progress-section {
            margin-top: 30px;
            padding: 16px;
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
        }
        .progress-bar { background: #1a1a1a; border-radius: 10px; height: 6px; overflow: hidden; margin-top: 8px; }
        .progress-fill { background: #ffd966; height: 100%; width: 0%; transition: width 0.3s; }
        .progress-text { font-size: 11px; color: #888; margin-top: 8px; text-align: center; }
        .footer-note { margin-top: 30px; text-align: center; font-size: 11px; color: #555; padding-top: 20px; border-top: 1px solid #222; }
        
        @media (max-width: 600px) {
            body { padding: 15px; }
            .play-btn { width: 40px; height: 40px; font-size: 18px; }
            .audio-title { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="audio-header">
        <h2>🎧 AUDIO ARCHIVE</h2>
        <div class="audio-stats" id="audioStats">🎧 已播放: 0 次</div>
    </div>
    <div id="audioList" class="audio-list"></div>
    <div class="progress-section">
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        <div id="progressText" class="progress-text"></div>
    </div>
    <div class="footer-note">💡 点击播放 · 有些录音已经损坏<br>📝 可以查看转录文字了解内容</div>

    <script>
        // 音频数据 - 使用在线环境音效（无人声）
        const audioFiles = [
            { 
                id: 1, 
                title: "练习室的回声", 
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
                fallback: true,
                duration: "00:08", 
                transcript: "[脚步声在空旷的练习室里回响]\n\n没有人。只有镜子里的自己。", 
                note: "练习室。很安静。只有回声。",
                damaged: false
            },
            { 
                id: 2, 
                title: "窗外的雨声", 
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
                fallback: true,
                duration: "00:10", 
                transcript: "[雨滴打在窗户上]\n\n断断续续的声音。像在说什么。", 
                note: "下雨天。忘记带伞了。",
                damaged: false
            },
            { 
                id: 3, 
                title: "深夜的街道", 
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
                fallback: true,
                duration: "00:07", 
                transcript: "[远处偶尔有车经过]\n\n很安静。只有风声。", 
                note: "凌晨两点。便利店门口。",
                damaged: false
            },
            { 
                id: 4, 
                title: "损坏的录音 #1", 
                url: null,
                duration: "00:05", 
                transcript: "[录音损坏，无法播放]\n\n只剩下杂音。", 
                note: "文件已损坏。",
                damaged: true
            },
            { 
                id: 5, 
                title: "损坏的录音 #2", 
                url: null,
                duration: "00:05", 
                transcript: "[录音损坏，无法播放]\n\n什么也听不清。", 
                note: "文件已损坏。",
                damaged: true
            }
        ];

        let playCount = 0;
        let currentlyPlaying = null;
        let currentAudio = null;
        const targetPlays = 3;

        function loadPlayCount() {
            const saved = localStorage.getItem('hee_archive_dialogue');
            if (saved) {
                const userData = JSON.parse(saved);
                playCount = userData.audioPlayCount || 0;
                updateStatsDisplay();
                updateProgress();
            }
        }

        function savePlayCount() {
            const saved = localStorage.getItem('hee_archive_dialogue');
            let userData = saved ? JSON.parse(saved) : {};
            userData.audioPlayCount = playCount;
            localStorage.setItem('hee_archive_dialogue', JSON.stringify(userData));
            
            if (window.parent && window.parent.playAudio) {
                window.parent.playAudio();
            }
        }

        function updateStatsDisplay() {
            const statsEl = document.getElementById('audioStats');
            if (statsEl) {
                statsEl.innerHTML = `🎧 已播放: ${playCount} 次`;
                if (playCount >= targetPlays) {
                    statsEl.innerHTML = `🎧 已播放: ${playCount} 次 ✨ 已完成 ✨`;
                    statsEl.style.color = '#ffd966';
                }
            }
        }

        function updateProgress() {
            const percent = Math.min(100, (playCount / targetPlays) * 100);
            const fill = document.getElementById('progressFill');
            const text = document.getElementById('progressText');
            if (fill) fill.style.width = percent + '%';
            if (text) {
                if (playCount >= targetPlays) {
                    text.innerHTML = '✨ 已收听足够音频 · 继续探索其他内容 ✨';
                    text.style.color = '#ffd966';
                } else {
                    text.innerHTML = `收听进度: ${playCount}/${targetPlays} 段音频 · 听他说的话`;
                    text.style.color = '#888';
                }
            }
        }

        function playAudioFile(fileId, btnElement, audioUrl, isDamaged) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            
            if (currentlyPlaying === fileId) {
                currentlyPlaying = null;
                btnElement.textContent = '▶';
                btnElement.classList.remove('playing');
                return;
            }
            
            if (currentlyPlaying && currentlyPlaying !== fileId) {
                const prevBtn = document.getElementById(`playBtn${currentlyPlaying}`);
                if (prevBtn) {
                    prevBtn.textContent = '▶';
                    prevBtn.classList.remove('playing');
                }
            }
            
            currentlyPlaying = fileId;
            btnElement.textContent = '⏸';
            btnElement.classList.add('playing');
            
            // 损坏的音频只增加计数，不播放声音
            if (isDamaged) {
                setTimeout(() => {
                    if (currentlyPlaying === fileId) {
                        currentlyPlaying = null;
                        btnElement.textContent = '▶';
                        btnElement.classList.remove('playing');
                    }
                }, 1500);
            } else if (audioUrl) {
                currentAudio = new Audio(audioUrl);
                currentAudio.volume = 0.3;
                currentAudio.play().catch(e => {
                    console.log('Audio play failed:', e);
                    playMockSound();
                });
                currentAudio.onended = () => {
                    if (currentlyPlaying === fileId) {
                        currentlyPlaying = null;
                        btnElement.textContent = '▶';
                        btnElement.classList.remove('playing');
                    }
                };
            } else {
                playMockSound();
                setTimeout(() => {
                    if (currentlyPlaying === fileId) {
                        currentlyPlaying = null;
                        btnElement.textContent = '▶';
                        btnElement.classList.remove('playing');
                    }
                }, 2000);
            }
            
            // 增加播放次数（损坏的也计数）
            playCount++;
            savePlayCount();
            updateStatsDisplay();
            updateProgress();
        }

        function playMockSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.type = 'sine';
                o.frequency.value = 200 + Math.random() * 200;
                g.gain.setValueAtTime(0.03, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
                o.connect(g);
                g.connect(ctx.destination);
                o.start();
                o.stop(ctx.currentTime + 1.5);
                setTimeout(() => ctx.close(), 2000);
            } catch(e) {}
        }

        function renderAudioList() {
            const container = document.getElementById('audioList');
            container.innerHTML = '';
            audioFiles.forEach(file => {
                const item = document.createElement('div');
                item.className = 'audio-item';
                const damagedClass = file.damaged ? 'damaged' : '';
                const damagedBadge = file.damaged ? '<span class="damaged-badge">⚠️ 损坏</span>' : '';
                const transcriptClass = file.damaged ? 'damaged' : '';
                
                item.innerHTML = `
                    <div class="audio-control" onclick="toggleTranscript(${file.id})">
                        <div class="play-btn ${damagedClass}" id="playBtn${file.id}" onclick="event.stopPropagation(); playAudio(${file.id}, this, '${file.url || ''}', ${file.damaged})">▶</div>
                        <div class="audio-info">
                            <div class="audio-title">${file.title} ${damagedBadge}</div>
                            <div class="audio-duration">${file.duration}</div>
                            <div class="audio-note">💬 ${file.note}</div>
                        </div>
                    </div>
                    <div class="transcript ${transcriptClass}" id="transcript${file.id}">
                        <span style="color:#888;">📝 转录文本:</span><br>
                        "${file.transcript}"
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function toggleTranscript(fileId) {
            const transcript = document.getElementById(`transcript${fileId}`);
            if (transcript) transcript.classList.toggle('open');
        }

        function playAudio(fileId, btnElement, audioUrl, isDamaged) {
            playAudioFile(fileId, btnElement, audioUrl, isDamaged);
        }

        window.toggleTranscript = toggleTranscript;
        window.playAudio = playAudio;

        renderAudioList();
        loadPlayCount();
    </script>
</body>
</html>
