<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAVORITES - HEE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', 'Courier New', monospace;
            color: #ccc;
            padding: 20px;
            min-height: 100vh;
        }
        .fav-header {
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 10px;
        }
        .fav-header h2 { color: #ffd966; font-size: 20px; }
        .fav-stats { font-size: 11px; color: #ffd966; }
        .fav-section { margin-bottom: 35px; }
        .fav-section h3 {
            color: #ffd966;
            font-size: 16px;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2a2a2a;
        }
        .fav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }
        .fav-card {
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.2s;
            cursor: pointer;
        }
        .fav-card:hover {
            border-color: #3a6ea5;
            transform: translateY(-3px);
        }
        .fav-image {
            aspect-ratio: 1;
            background: #060606;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .fav-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .fav-card:hover .fav-image img {
            transform: scale(1.05);
        }
        .fav-image .no-img {
            font-size: 48px;
            color: #555;
        }
        .fav-info { padding: 12px; }
        .fav-title { font-size: 13px; color: #ffd966; margin-bottom: 4px; font-weight: 500; }
        .fav-note { font-size: 10px; color: #888; line-height: 1.4; font-style: italic; }
        .click-count {
            margin-top: 8px;
            font-size: 10px;
            color: #ffd966;
            text-align: right;
        }
        .progress-section {
            margin-top: 30px;
            padding: 16px;
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
        }
        .progress-bar { background: #1a1a1a; border-radius: 10px; height: 6px; overflow: hidden; margin-top: 8px; }
        .progress-fill { background: #ffd966; height: 100%; width: 0%; transition: width 0.3s; }
        .progress-text { font-size: 11px; color: #888; margin-top: 8px; text-align: center; }
        .footer-note { margin-top: 30px; text-align: center; font-size: 11px; color: #555; padding-top: 20px; border-top: 1px solid #222; }
        
        @media (max-width: 600px) {
            body { padding: 15px; }
            .fav-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
            .fav-title { font-size: 11px; }
            .fav-note { font-size: 9px; }
        }
    </style>
</head>
<body>
    <div class="fav-header">
        <h2>⭐ FAVORITES</h2>
        <div class="fav-stats" id="favStats">点击次数: 0</div>
    </div>

    <div class="fav-section">
        <h3>🎵 SONGS</h3>
        <div id="songsGrid" class="fav-grid"></div>
    </div>

    <div class="fav-section">
        <h3>🎬 MOVIES</h3>
        <div id="moviesGrid" class="fav-grid"></div>
    </div>

    <div class="fav-section">
        <h3>📷 PHOTOS</h3>
        <div id="photosGrid" class="fav-grid"></div>
    </div>

    <div class="progress-section">
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        <div id="progressText" class="progress-text"></div>
    </div>

    <div class="footer-note">
        💡 点击任意项目 · 羲承会记住你的选择
    </div>

    <script>
        // 收藏数据 - 使用绝对路径（替换成你的用户名）
        const favoritesData = {
            songs: [
                { emoji: "🎵", title: "凌晨三点的歌", image: "https://yu1hs.github.io/ACCESS_DENIED/archive/assets/images/favorites/song1.jpg", note: "凌晨三点听比较好。\n白天听的话就没感觉了。" },
                { emoji: "🎶", title: "写给谁都可以", image: "https://yu1hs.github.io/ACCESS_DENIED/archive/assets/images/favorites/song2.jpg", note: "第一次听的时候觉得这是写给别人的。\n后来发现写给谁都行。" },
                { emoji: "🎧", title: "想起某天", image: "https://yu1hs.github.io/ACCESS_DENIED/archive/assets/images/favorites/song3.jpg", note: "这首不常听。\n但每次听都会想起某天。" }
            ],
            movies: [
                { emoji: "🎬", title: "推荐的", image: "https://yu1hs.github.io/ACCESS_DENIED/archive/assets/images/favorites/movie1.jpg", note: "第二次看比第一次好。\n有机会一起看吧" },
                { emoji: "📽️", title: "喜欢的", image: "https://yu1hs.github.io/ACCESS_DENIED/archive/assets/images/favorites/movie2.jpg", note: "有喜欢的角色。\n看了很多遍。" },
                { emoji: "🎞️", title: "人生电影", image: "https://yu1hs.github.io/ACCESS_DENIED/archive/assets/images/favorites/movie3.jpg", note: "  \n对我很有意义" }
            ],
            photos: [
                { emoji: "📷", title: "天气很好", image: "https://yu1hs.github.io/ACCESS_DENIED/archive/assets/images/favorites/fav_photo1.jpg", note: "天气很好那天。" },
                { emoji: "🌅", title: "没人", image: "https://yu1hs.github.io/ACCESS_DENIED/archive/assets/images/favorites/fav_photo2.jpg", note: "没人。" },
                { emoji: "🌃", title: "想发出去", image: "https://yu1hs.github.io/ACCESS_DENIED/archive/assets/images/favorites/fav_photo3.jpg", note: "那天本来想发出去的。" }
            ]
        };

        let totalClicks = 0;
        const targetClicks = 8;

        function loadClickCounts() {
            const saved = localStorage.getItem('hee_archive_dialogue');
            if (saved) {
                const userData = JSON.parse(saved);
                totalClicks = userData.favClickCount || 0;
                updateStatsDisplay();
                updateProgress();
            }
        }

        function saveClickCount() {
            totalClicks++;
            const saved = localStorage.getItem('hee_archive_dialogue');
            let userData = saved ? JSON.parse(saved) : {};
            userData.favClickCount = totalClicks;
            localStorage.setItem('hee_archive_dialogue', JSON.stringify(userData));
            
            updateStatsDisplay();
            updateProgress();
            
            if (window.parent && window.parent.increaseFavClick) {
                window.parent.increaseFavClick();
            }
            
            setTimeout(() => {
                const chatWindow = window.parent.document.getElementById('chatWindow');
                if (chatWindow && chatWindow.classList.contains('hidden')) {
                    chatWindow.classList.remove('hidden');
                }
            }, 300);
        }

        function updateStatsDisplay() {
            const statsEl = document.getElementById('favStats');
            if (statsEl) {
                statsEl.textContent = `🎧 点击次数: ${totalClicks}`;
                if (totalClicks >= targetClicks) {
                    statsEl.style.color = '#ffd966';
                    statsEl.innerHTML = `🎧 点击次数: ${totalClicks} ✨ 已达到共鸣条件 ✨`;
                }
            }
        }

        function updateProgress() {
            const percent = Math.min(100, (totalClicks / targetClicks) * 100);
            const fill = document.getElementById('progressFill');
            const text = document.getElementById('progressText');
            if (fill) fill.style.width = percent + '%';
            if (text) {
                if (totalClicks >= targetClicks) {
                    text.innerHTML = '✨ 已达到「共鸣」条件 ✨';
                    text.style.color = '#ffd966';
                } else {
                    text.innerHTML = `共鸣进度: ${totalClicks}/${targetClicks} 次点击 · 继续探索羲承的喜好`;
                    text.style.color = '#888';
                }
            }
        }

        function renderCard(item) {
            const card = document.createElement('div');
            card.className = 'fav-card';
            card.onclick = () => {
                saveClickCount();
                const note = document.createElement('div');
                note.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#3a6ea5;padding:8px 16px;border-radius:8px;font-size:12px;z-index:1000;';
                note.textContent = '⭐ 已收藏到记忆 · 羲承会记住';
                document.body.appendChild(note);
                setTimeout(() => note.remove(), 1500);
            };
            
            let imageHtml = '';
            if (item.image) {
                imageHtml = `<img src="${item.image}" alt="${item.title}" onerror="this.parentElement.innerHTML='<div class=\'no-img\'>${item.emoji}</div>'">`;
            } else {
                imageHtml = `<div class="no-img">${item.emoji}</div>`;
            }
            
            card.innerHTML = `
                <div class="fav-image">${imageHtml}</div>
                <div class="fav-info">
                    <div class="fav-title">${item.title}</div>
                    <div class="fav-note">${item.note.replace(/\n/g, '<br>')}</div>
                    <div class="click-count">🎵</div>
                </div>
            `;
            return card;
        }

        function renderGrid(category, items, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            items.forEach((item) => {
                container.appendChild(renderCard(item));
            });
        }

        // 渲染所有
        renderGrid('songs', favoritesData.songs, 'songsGrid');
        renderGrid('movies', favoritesData.movies, 'moviesGrid');
        renderGrid('photos', favoritesData.photos, 'photosGrid');
        
        loadClickCounts();
    </script>
</body>
</html>
