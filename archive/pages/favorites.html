<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAVORITES - HEE_ARCHIVE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', 'Courier New', monospace;
            color: #ccc;
            padding: 30px;
            min-height: 100vh;
        }

        .fav-header {
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .fav-header h2 {
            color: #ffd966;
            font-size: 20px;
            letter-spacing: 2px;
        }

        .fav-section {
            margin-bottom: 35px;
        }

        .fav-section h3 {
            color: #ffd966;
            font-size: 16px;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2a2a2a;
        }

        .fav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .fav-card {
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 16px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .fav-card:hover {
            border-color: #3a6ea5;
            transform: translateY(-2px);
        }

        .fav-emoji {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .fav-title {
            font-size: 14px;
            color: #ddd;
            margin-bottom: 8px;
        }

        .fav-note {
            font-size: 11px;
            color: #888;
            line-height: 1.5;
            font-style: italic;
        }

        .click-count {
            margin-top: 10px;
            font-size: 10px;
            color: #555;
            text-align: right;
        }

        .footer-note {
            margin-top: 30px;
            text-align: center;
            font-size: 11px;
            color: #555;
            padding-top: 20px;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>
    <div class="fav-header">
        <h2>⭐ FAVORITES</h2>
    </div>

    <div class="fav-section">
        <h3>🎵 SONGS</h3>
        <div id="songsGrid" class="fav-grid"></div>
    </div>

    <div class="fav-section">
        <h3>🎬 MOVIES</h3>
        <div id="moviesGrid" class="fav-grid"></div>
    </div>

    <div class="fav-section">
        <h3>📷 PHOTOS</h3>
        <div id="photosGrid" class="fav-grid"></div>
    </div>

    <div class="footer-note">
        💡 点击任意项目 · 羲承会记住你的选择
    </div>

    <script>
        // 收藏数据
        const favoritesData = {
            songs: [
                { emoji: "🎵", title: "未命名", note: "凌晨三点听比较好。\n白天听的话就没感觉了。" },
                { emoji: "🎶", title: "未命名", note: "第一次听的时候觉得这是写给别人的。\n后来发现写给谁都行。" },
                { emoji: "🎧", title: "未命名", note: "这首不常听。\n但每次听都会想起某天。" }
            ],
            movies: [
                { emoji: "🎬", title: "未命名", note: "第二次看比第一次好。\n第三次比第二次差一点。\n第四次...还没看第四次。" },
                { emoji: "📽️", title: "未命名", note: "结局不喜欢。\n但前面的部分看了很多遍。" },
                { emoji: "🎞️", title: "未命名", note: "不知道在讲什么。\n画面很好看。\n够了。" }
            ],
            photos: [
                { emoji: "📷", title: "未命名", note: "天气很好那天。" },
                { emoji: "🌅", title: "未命名", note: "没人。" },
                { emoji: "🌃", title: "未命名", note: "那天本来想发出去的。" }
            ]
        };

        // 加载点击统计
        function loadClickCounts() {
            const saved = localStorage.getItem('hee_archive_user');
            if (saved) {
                const userData = JSON.parse(saved);
                return userData.favClicks || {};
            }
            return {};
        }

        function saveClickCount(category, index) {
            const saved = localStorage.getItem('hee_archive_user');
            let userData = saved ? JSON.parse(saved) : {};
            if (!userData.favClicks) userData.favClicks = {};
            const key = `${category}_${index}`;
            userData.favClicks[key] = (userData.favClicks[key] || 0) + 1;
            localStorage.setItem('hee_archive_user', JSON.stringify(userData));
            
            // 记录对话
            if (!userData.conversations) userData.conversations = [];
            userData.conversations.push({ type: 'fav_click', category, index, time: Date.now() });
            localStorage.setItem('hee_archive_user', JSON.stringify(userData));
            
            // 触发聊天
            setTimeout(() => {
                const chatWindow = window.parent.document.getElementById('chatWindow');
                if (chatWindow && chatWindow.classList.contains('hidden')) {
                    chatWindow.classList.remove('hidden');
                }
            }, 300);
        }

        function renderGrid(category, items, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            container.innerHTML = '';
            const clickCounts = loadClickCounts();
            
            items.forEach((item, index) => {
                const key = `${category}_${index}`;
                const clicks = clickCounts[key] || 0;
                
                const card = document.createElement('div');
                card.className = 'fav-card';
                card.onclick = () => {
                    saveClickCount(category, index);
                    // 可选：显示提示
                    const note = document.createElement('div');
                    note.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#3a6ea5;padding:8px16px;border-radius:8px;font-size:12px;z-index:1000;';
                    note.textContent = '⭐ 已收藏到记忆';
                    document.body.appendChild(note);
                    setTimeout(() => note.remove(), 1500);
                };
                
                card.innerHTML = `
                    <div class="fav-emoji">${item.emoji}</div>
                    <div class="fav-title">${item.title}</div>
                    <div class="fav-note">${item.note.replace(/\n/g, '<br>')}</div>
                    ${clicks > 0 ? `<div class="click-count">🎧 听过 ${clicks} 次</div>` : ''}
                `;
                
                container.appendChild(card);
            });
        }

        // 渲染所有
        renderGrid('songs', favoritesData.songs, 'songsGrid');
        renderGrid('movies', favoritesData.movies, 'moviesGrid');
        renderGrid('photos', favoritesData.photos, 'photosGrid');
    </script>
</body>
</html>
