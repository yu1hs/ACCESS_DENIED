<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEE_ARCHIVE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 新增样式补充 */
        .hidden { display: none !important; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .chat-message {
            padding: 10px 14px;
            border-radius: 10px;
            max-width: 80%;
            font-size: 13px;
            line-height: 1.6;
            color: #bbb;
            background: #1e1e1e;
            margin: 6px 0;
            animation: fadeIn 0.3s ease;
            word-break: break-word;
        }
        .chat-message.self {
            background: #2a4a3a;
            color: #c8e6c9;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }
        .chat-message.system {
            background: #1a1a0a;
            color: #ffd966;
            text-align: center;
            max-width: 100%;
            font-size: 11px;
            border: 1px dashed #333;
        }
        
        .chat-option-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #999;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            transition: 0.2s;
            white-space: pre-wrap;
            text-align: left;
        }
        .chat-option-btn:hover {
            background: #222;
            border-color: #ffd966;
            color: #ffd966;
        }
        
        #chatInputArea {
            padding: 8px 12px;
            border-top: 1px solid #222;
            display: flex;
            gap: 8px;
        }
        #chatInput {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #ccc;
            padding: 10px 14px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            outline: none;
            transition: 0.2s;
        }
        #chatInput:focus { border-color: #ffd966; }
        #chatInput::placeholder { color: #444; }
        
        #chatSend {
            background: #2a4a3a;
            border: none;
            color: #c8e6c9;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            transition: 0.2s;
        }
        #chatSend:hover { background: #3a6b4f; }
        
        #notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            border: 1px solid #ffd966;
            color: #ffd966;
            padding: 10px 24px;
            border-radius: 8px;
            z-index: 10000;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            transition: 0.3s;
        }
        
        .familiarity-bar {
            font-size: 9px;
            margin-left: 10px;
            transition: all 0.5s;
        }
        
        .nav-item { transition: 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部标题栏 -->
        <div class="header">
            <div class="logo">HEE_ARCHIVE</div>
            <div class="header-status">
                <span id="onlineStatus">🔒</span>
                <span id="onlineText">OFFLINE</span>
            </div>
        </div>

        <!-- 主要内容区 -->
        <div class="main">
            <!-- 左侧导航栏 -->
            <div class="sidebar">
                <div class="nav-item active" data-page="home"><span class="nav-icon">🏠</span> HOME</div>
                <div class="nav-item locked" data-page="profile"><span class="nav-icon">🔒</span> PROFILE</div>
                <div class="nav-item locked" data-page="photo"><span class="nav-icon">🔒</span> PHOTO</div>
                <div class="nav-item locked" data-page="audio"><span class="nav-icon">🔒</span> AUDIO</div>
                <div class="nav-item locked" data-page="log"><span class="nav-icon">🔒</span> LOG</div>
                <div class="nav-item locked" data-page="favorites"><span class="nav-icon">🔒</span> FAVORITES</div>
                <div class="nav-item" data-page="trash"><span class="nav-icon">🗑️</span> TRASH</div>
                <div class="nav-item hidden" id="userNav" data-page="user"><span class="nav-icon">👤</span> USER</div>
            </div>

            <!-- 右侧内容区 -->
            <div class="content-area">
                <iframe id="pageFrame" src="pages/home.html"></iframe>
            </div>
        </div>

        <!-- 底部状态栏 -->
        <div class="footer">
            <div class="footer-left">
                <span id="loginCount">访问次数: --</span>
            </div>
            <div class="footer-right">
                <span id="lastLogin">上次登录: --</span>
            </div>
        </div>
    </div>

    <!-- 聊天窗口 -->
    <div id="chatWindow" class="chat-window hidden">
        <div class="chat-header">
            <span>💬 Lee Heeseung</span>
            <button id="closeChat">✕</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-options" id="chatOptions"></div>
        <!-- 👇 新增：自由输入区（默认隐藏） -->
        <div id="chatInputArea" class="hidden">
            <input type="text" id="chatInput" placeholder="输入你的回答……" onkeydown="if(event.key==='Enter')document.getElementById('chatSend').click()">
            <button id="chatSend">发送</button>
        </div>
    </div>

    <!-- 聊天通知 -->
    <div id="chatNotify" class="chat-notify hidden">💬</div>

    <!-- 全局通知 -->
    <div id="notification" class="hidden"></div>

    <!-- 脚本 -->
    <script src="script.js"></script>
</body>
</html>
