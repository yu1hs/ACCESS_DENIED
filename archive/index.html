<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>HEE · 痕迹</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='70' font-size='70' text-anchor='middle' fill='%23ffd966'%3E🦌%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
    <style>
        /* 响应式覆盖 */
        @media (max-width: 768px) {
            .sidebar { width: 140px; }
            .nav-item { padding: 10px 12px; font-size: 11px; }
            .logo { font-size: 16px; }
            .chat-window { width: 90%; right: 5%; left: 5%; bottom: 10px; height: 70vh; }
            .footer { font-size: 9px; padding: 6px 12px; }
            .footer-center .back-desktop-btn { padding: 3px 10px; font-size: 10px; }
        }
        
        @media (max-width: 480px) {
            .sidebar { width: 100px; }
            .nav-item { padding: 8px 8px; font-size: 10px; }
            .logo { font-size: 14px; }
            .window-title { font-size: 10px; }
            .chat-message { font-size: 11px; max-width: 90%; }
            .chat-option-btn { font-size: 10px; padding: 6px 10px; }
        }
        
        @media (hover: none) and (pointer: coarse) {
            .nav-item, .chat-option-btn, .back-desktop-btn { 
                padding: 12px 16px; 
                min-height: 44px;
            }
        }
        
        /* 彩蛋动画 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake-effect {
            animation: shake 0.3s ease-in-out;
        }
        
        .heart-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
        
        .floating-heart {
            position: absolute;
            color: #ff66aa;
            font-size: 20px;
            animation: floatHeart 2s ease-out forwards;
        }
        
        @keyframes floatHeart {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 窗口标题栏 -->
        <div class="window-titlebar">
            <div class="window-title">
                <span class="window-icon">📁</span>
                <span>HEE.exe</span>
            </div>
            <div class="window-controls">
                <button class="window-btn window-minimize" id="minimizeWindow">─</button>
                <button class="window-btn window-close" id="closeWindow">✕</button>
            </div>
        </div>

        <!-- 顶部导航栏 -->
        <div class="header">
            <div class="logo">HEE</div>
            <div class="header-status">
                <span id="onlineStatus">🔒</span>
                <span id="onlineText">OFFLINE</span>
            </div>
        </div>

        <!-- 主要内容区 -->
        <div class="main">
            <!-- 左侧导航栏 -->
            <div class="sidebar">
                <div class="nav-item" data-page="home">🏠 HOME</div>
                <div class="nav-item locked" data-page="trash">🗑️ TRASH</div>
                <div class="nav-item locked" data-page="profile">🔒 PROFILE</div>
                <div class="nav-item locked" data-page="photo">🔒 PHOTO</div>
                <div class="nav-item locked" data-page="audio">🔒 AUDIO</div>
                <div class="nav-item locked" data-page="log">🔒 LOG</div>
                <div class="nav-item locked" data-page="favorites">🔒 FAVORITES</div>
                <div class="nav-item hidden" id="userNav" data-page="user">👤 USER</div>
            </div>

            <!-- 右侧内容区 -->
            <div class="content-area">
                <iframe id="pageFrame" src="pages/home.html"></iframe>
            </div>
        </div>

        <!-- 底部状态栏 -->
        <div class="footer">
            <div class="footer-left">
                <span id="loginCount">访问次数: --</span>
                <span id="dayDisplay" style="margin-left: 12px; font-size: 11px;"></span>
            </div>
            <div class="footer-center">
                <button id="backToDesktop" class="back-desktop-btn">🖥️ 返回桌面</button>
            </div>
            <div class="footer-right">
                <span id="lastLogin">首次: --</span>
                <span id="achievementDisplay" style="margin-left: 12px; font-size: 11px;"></span>
            </div>
        </div>
    </div>

    <!-- 聊天窗口 -->
    <div id="chatWindow" class="chat-window hidden">
        <div class="chat-header">
            <span>💬 与 羲承 的对话</span>
            <button id="closeChat">✕</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="chat-system">对话已建立连接...</div>
        </div>
        <div class="chat-input-area">
            <div class="chat-options" id="chatOptions"></div>
            <div id="chatInputArea" class="hidden">
                <input type="text" id="chatInput" placeholder="输入消息...">
                <button id="chatSend">发送</button>
            </div>
        </div>
    </div>

    <!-- 聊天通知 -->
    <div id="chatNotify" class="chat-notify hidden">💬 新消息</div>

    <!-- 加载遮罩 -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loading-spinner"></div>
        <div class="loading-text">加载中...</div>
    </div>

    <!-- 关闭确认对话框 -->
    <div id="closeConfirmDialog" class="dialog hidden">
        <div class="dialog-content">
            <h3>🔒 关闭 HEE</h3>
            <p>你确定要关闭吗？</p>
            <p style="font-size: 12px; color: #888; margin-top: 8px;">下次打开时，记忆会保留。</p>
            <div class="dialog-buttons">
                <button id="confirmClose">关闭</button>
                <button id="cancelClose">取消</button>
            </div>
        </div>
    </div>

    <!-- 通知 -->
    <div id="notification" class="notification hidden"></div>

    <script src="cute-easter-eggs.js"></script>
    <script src="script.js"></script>
</body>
</html>
