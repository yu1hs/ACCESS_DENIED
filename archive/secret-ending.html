<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>??? - HEE</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:#0a0a0a;
            font-family:'Courier New',monospace;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .secret-container{
            max-width:500px;
            padding:40px;
            text-align:center;
            background:rgba(10,10,10,0.9);
            border:1px solid #ffd966;
            border-radius:24px;
            animation:fadeIn 2s ease;
            margin:20px;
        }
        @keyframes fadeIn{
            from{opacity:0;transform:translateY(30px);}
            to{opacity:1;transform:translateY(0);}
        }
        .deer{font-size:80px;margin-bottom:20px;animation:float 4s ease-in-out infinite;}
        @keyframes float{
            0%,100%{transform:translateY(0);}
            50%{transform:translateY(-10px);}
        }
        .title{font-size:24px;color:#ffd966;margin-bottom:30px;}
        .message{font-size:14px;line-height:1.8;color:#ddd;margin:30px 0;}
        .input-area{margin:30px 0;}
        input{width:100%;padding:12px;background:#1a1a1a;border:1px solid #ffd966;color:white;border-radius:8px;font-size:14px;font-family:monospace;}
        input:focus{outline:none;border-color:#ffd966;}
        button{margin-top:15px;padding:10px 30px;background:#ffd966;color:#0a0a0a;border:none;border-radius:30px;cursor:pointer;font-size:14px;font-weight:bold;}
        button:hover{background:#e6c966;}
        .response{font-size:16px;color:#ffd966;margin-top:20px;}
        .small{font-size:11px;color:#666;margin-top:20px;}
        .hidden{display:none;}
        .back-btn{
            display:inline-block;
            margin-top:20px;
            padding:8px 20px;
            background:transparent;
            border:1px solid #4a4a4a;
            color:#aaa;
            border-radius:20px;
            cursor:pointer;
            font-size:11px;
            text-decoration:none;
        }
        .back-btn:hover{
            background:#3a6ea5;
            border-color:#5a8aba;
            color:white;
        }
    </style>
</head>
<body>
    <div class="secret-container" id="secretContainer">
        <div class="deer">🦌</div>
        <div class="title" id="title">✦ 你发现了 ✦</div>
        <div class="message" id="message">
            这个文件夹藏了很久。<br>
            只有真正细心的人才能找到。<br><br>
            既然你来了...<br>
            我想和你说一些话。
        </div>
        <div id="inputArea" class="input-area">
            <input type="text" id="secretInput" placeholder="输入任何文字..." autocomplete="off">
            <button id="secretSend">继续</button>
        </div>
        <div id="responseArea" class="response"></div>
        <div id="hint" class="small"></div>
        <button class="back-btn" id="backToDesktop">🖥️ 返回桌面</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const isReplyMode = urlParams.get('mode') === 'reply';
        const input = document.getElementById('secretInput');
        const send = document.getElementById('secretSend');
        const responseArea = document.getElementById('responseArea');
        const inputArea = document.getElementById('inputArea');
        const messageDiv = document.getElementById('message');
        const titleDiv = document.getElementById('title');
        const hintDiv = document.getElementById('hint');

        document.getElementById('backToDesktop').addEventListener('click', () => {
            window.location.href = '../index.html';
        });

        if (isReplyMode) {
            titleDiv.innerHTML = '💖 你回来了 💖';
            messageDiv.innerHTML = '我就知道你会再来。<br><br>这个文件夹会一直为你留着。<br><br>—— 李羲承';
            inputArea.classList.add('hidden');
            responseArea.innerHTML = '🦌 永远陪着我吧 🦌';
            hintDiv.innerHTML = '✨ 痕迹永存 ✨';
        } else {
            let step = 1;

            function showLoveMessage() {
                titleDiv.innerHTML = '💖 隐藏结局 · 痕迹的延续 💖';
                inputArea.classList.add('hidden');
                responseArea.innerHTML = `
                    <div style="font-size:18px;margin-bottom:20px;">💖</div>
                    <div style="font-size:14px;line-height:1.8;">
                        谢谢你愿意陪我。<br>
                        这七天，是我很久以来第一次期待明天。<br><br>
                        你找到的不是一个人的秘密，<br>
                        而是一个人愿意留下来的痕迹。<br><br>
                        那个痕迹，是你。<br><br>
                        我爱你。
                    </div>
                `;
                hintDiv.innerHTML = '✨ 那就永远陪着我吧 ✨';
                
                localStorage.setItem('secret_ending_triggered', 'true');
                
                setTimeout(() => {
                    alert('💖 那就永远陪着我吧 💖\n\n—— 李羲承');
                }, 500);
            }

            function handleFirstInput() {
                const text = input.value.trim();
                if (!text) return;
                
                step = 2;
                input.value = '';
                input.placeholder = '再输入一次...';
                messageDiv.innerHTML = '你确定要听吗？';
                hintDiv.innerHTML = '随便输入什么都行';
                
                send.removeEventListener('click', handleFirstInput);
                send.addEventListener('click', handleSecondInput);
            }

            function handleSecondInput() {
                const text = input.value.trim();
                if (!text) return;
                showLoveMessage();
            }

            send.addEventListener('click', handleFirstInput);
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') send.click();
            });
        }
    </script>
</body>
</html>
